<!DOCTYPE html>
<html lang="en" class="html--no-js">
  <head>
    {% include head--common.html %} {% include prebidjs-non-prod.html %}
    {% include loadScript.html %}
    {% include video/mock-video-bid.html %}

    <!--pbjs and player code -->

    <!-- use recent version of videojs to ensure proper functioning with the iOS devices -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/video.js/6.4.0/video-js.css"
    />
    <link
      href="https://cdnjs.cloudflare.com/ajax/libs/videojs-vast-vpaid/2.0.2/videojs.vast.vpaid.min.css"
      rel="stylesheet"
    />
    <!-- videojs-vast-vpaid -->
    <script type="text/javascript" class="cmplazyload" data-cmp-purpose="c51">
      loadScript('https://cdnjs.cloudflare.com/ajax/libs/video.js/6.4.0/video.js')
        .then(() => loadScript('https://cdnjs.cloudflare.com/ajax/libs/videojs-vast-vpaid/2.0.2/videojs_5.vast.vpaid.min.js'))
        .then(() => {
          window.runVideoJSCode();
          window.pbjs = window.pbjs || {};
          pbjs.que = pbjs.que || [];

          /* Prebid video ad unit */

          var videoAdUnit = {
            code: 'video1',
            mediaTypes: {
              video: {
                context: 'instream',
                playerSize: [640, 480],
                mimes: ['video/mp4'],
                protocols: [1, 2, 3, 4, 5, 6, 7, 8],
                playbackmethod: [2],
                skip: 1,
              },
            },
            bids: [
              {
                bidder: 'appnexus',
                params: {
                  placementId: 13232361,
                },
              },
            ],
          };

          pbjs.que.push(function () {
            pbjs.addAdUnits(videoAdUnit);

            pbjs.setConfig({
              debug: true,
              cache: {
                useLocal: true
              },
            });

            pbjs.requestBids({
              bidsBackHandler: function (bids) {
                window.invokeVideoPlayer((callback) => {
                  pbjs.adServers.gam.getVastXml({
                    bid: bids.video1.bids[0],
                    adUnit: videoAdUnit,
                    params: {
                      iu: '/41758329/localcache',
                    },
                  }).then(vastXml => {
                    callback(null, vastXml)
                  })
                });
              },
            });
          });
      });
    </script>

  </head>

  <body></body>
</html>
